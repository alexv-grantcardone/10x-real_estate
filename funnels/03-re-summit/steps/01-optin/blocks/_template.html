<!--
  RE SUMMIT — OPT-IN BLOCK TEMPLATE  (copy me to NN-name.html to start a new block)
  Goes in: a GoHighLevel "Custom Code / HTML" element on the opt-in page.
  CONFIG: set the CTA destination on the line marked >>> CHECKOUT_URL <<< below.
  Rules: scoped CSS · IIFE JS · CSS-variable theming (blues) · fluid/mobile-first · real <a> CTA.
-->
<div class="gcres-block gcres-hero">
  <div class="gcres-hero__inner">
    <p class="gcres-eyebrow">92% OF TICKETS SOLD OUT</p>
    <h1 class="gcres-h1">
      Unlock the Proven Strategies Behind Grant's
      <span class="gcres-accent">$5 Billion</span> Multifamily Empire
    </h1>
    <p class="gcres-sub">Miami, FL &nbsp;·&nbsp; July 27–28, 2026 &nbsp;·&nbsp; 2 days, full immersion</p>

    <!-- Real anchor CTA — never a dead-end button. Point it at the checkout: -->
    <a class="gcres-cta"
       href="REPLACE_WITH_CHECKOUT_URL"  data-gcres="cta-hero">   <!-- >>> CHECKOUT_URL <<< -->
      Secure Your Seat Now
      <span class="gcres-cta__sub">Live, hands-on training with Grant Cardone</span>
    </a>
  </div>

  <style>
    /* 1+2. Everything scoped under .gcres-hero — no bare-tag selectors */
    .gcres-block.gcres-hero{
      /* 3. Theme variables (brand blues pulled from the live page) */
      --gcres-blue:#023681; --gcres-blue-bright:#155EEF; --gcres-cyan:#1BB4ED;
      --gcres-ink:#0a1230; --gcres-paper:#ffffff;
      box-sizing:border-box; width:100%;
      font-family:inherit;                 /* 5. inherits the page's Gotham */
      text-align:center; padding:clamp(28px,6vw,72px) clamp(16px,4vw,48px);
      background:linear-gradient(160deg,var(--gcres-blue) 0%,var(--gcres-blue-bright) 100%);
      color:var(--gcres-paper);
    }
    .gcres-hero *,.gcres-hero *::before,.gcres-hero *::after{box-sizing:border-box;}
    .gcres-hero__inner{max-width:860px;margin:0 auto;}
    .gcres-eyebrow{
      margin:0 0 14px; font-weight:700; letter-spacing:.12em;
      font-size:clamp(12px,2.4vw,15px); color:var(--gcres-cyan); text-transform:uppercase;
    }
    .gcres-h1{
      margin:0 0 16px; font-weight:800; line-height:1.08;
      font-size:clamp(28px,6vw,56px);    /* 6. fluid type for any column width */
    }
    .gcres-h1 .gcres-accent{color:var(--gcres-cyan);}
    .gcres-sub{margin:0 0 30px; opacity:.9; font-size:clamp(14px,2.6vw,19px);}
    .gcres-cta{
      display:inline-flex; flex-direction:column; align-items:center; gap:3px;
      text-decoration:none; cursor:pointer;
      padding:16px 40px; border-radius:10px;
      background:var(--gcres-cyan); color:var(--gcres-ink);
      font-weight:800; font-size:clamp(16px,3vw,21px);
      box-shadow:0 10px 26px rgba(0,0,0,.28); transition:transform .15s ease,box-shadow .15s ease;
    }
    .gcres-cta:hover{transform:translateY(-2px); box-shadow:0 14px 32px rgba(0,0,0,.34);}
    .gcres-cta__sub{font-weight:500; font-size:clamp(11px,2vw,13px); opacity:.85;}
    @media (max-width:480px){ .gcres-cta{width:100%; padding:16px 20px;} }
  </style>

  <script>
    /* 4. IIFE + re-entry guard — won't collide with or double-run on the GHL page */
    (function(){
      if (window.__gcresHero) return; window.__gcresHero = true;
      var root = document.currentScript ? document.currentScript.closest('.gcres-hero') : null;
      if (!root) return;
      // Example hook: warn (console only) if the CTA still points at the placeholder.
      var cta = root.querySelector('[data-gcres="cta-hero"]');
      if (cta && /REPLACE_WITH_CHECKOUT_URL/.test(cta.getAttribute('href')||'')) {
        console.warn('[gcres-hero] CTA href is still the placeholder — set CHECKOUT_URL.');
      }
    })();
  </script>
</div>
